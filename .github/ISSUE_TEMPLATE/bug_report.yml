name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in Vorssaint
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Vorssaint
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: Add screenshots or recordings if applicable.

  - type: input
    id: vorssaint_version
    attributes:
      label: Vorssaint Version
      placeholder: e.g. 2.12.0
    validations:
      required: true

  - type: dropdown
    id: macos_version
    attributes:
      label: macOS Version
      options:
        - macOS 27 (Golden Gate)
        - macOS 26 (Tahoe)
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
    validations:
      required: true

  - type: input
    id: installation_method
    attributes:
      label: Installation Method
      placeholder: Homebrew, DMG, GitHub Release, etc.
